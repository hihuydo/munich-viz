<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>München — Datenvisualisierungen</title>
  <link rel="stylesheet" href="./shared/style.css" />
  <link rel="stylesheet" href="./shared/landing.css" />
</head>
<body class="munich-shell">

  <header class="munich-shell__header">
    <h1 class="munich-shell__title">Datenvisualisierungen</h1>
  </header>

  <main class="munich-shell__main">
    <div class="munich-card-grid">

      <!-- ─────────────────────────────────────────────────────────
           Binnenwanderungsziffer
           Datenquelle: Statistisches Amt München
           Stand: 2023 · Kategorie: BEVÖLKERUNG
           ───────────────────────────────────────────────────────── -->
      <article class="munich-card">
        <a href="./binnenwanderungsziffer/dist/index.html" class="munich-card__link">
          <img
            class="munich-card__preview"
            src="./shared/binnenwanderungsziffer-preview.png"
            alt="Vorschau Binnenwanderungsziffer"
          />
          <div class="munich-card__body">
            <span class="munich-card__tag">BEVÖLKERUNG</span>
            <h2 class="munich-card__title">Binnenwanderungsziffer</h2>
            <p class="munich-card__desc">
              Netto-Wanderungssaldo pro 1.000 Einwohner zwischen
              den 25 Münchner Stadtbezirken — nach Nationalität.
            </p>
            <div class="munich-card__footer">
              <span class="munich-card__year">2023</span>
              <span class="munich-card__arrow">→</span>
            </div>
          </div>
        </a>
      </article>

      <!--
        Neue Visualisierung hinzufügen:

        1. Unterordner in `munich/<slug>/` anlegen
        2. Projekt dort bauen
        3. Vorschau unter `shared/<slug>-preview.png` speichern
        4. Karte mit den `munich-card__*` Klassen ergänzen
        5. Shared Styles einbinden:
           - statische HTML-Seiten: `../shared/style.css`
           - Landing-Page zusätzlich: `./shared/landing.css`
           - Vite/React-Apps: `@import "../../shared/style.css";`
      -->

    </div>
  </main>

</body>
</html>
