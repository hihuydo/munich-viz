<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>München — Datenvisualisierungen</title>
  <link rel="stylesheet" href="./shared/style.css" />
  <style>
    /* ── Layout ──────────────────────────────────────────────────── */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 0 24px 64px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      padding: 56px 0 48px;
      border-bottom: 1px solid var(--border-muted);
      margin-bottom: 56px;
    }

    .header-eyebrow {
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .header-title {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: normal;
      color: var(--text-primary);
      letter-spacing: 1px;
      line-height: 1.2;
    }

    .header-subtitle {
      display: block;
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-top: 10px;
    }

    /* ── Grid ───────────────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .section-label {
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── Karte ──────────────────────────────────────────────────── */
    /*
      ════════════════════════════════════════════════════════════════
      NEUE VISUALISIERUNG HINZUFÜGEN — Konvention
      ════════════════════════════════════════════════════════════════

      1. Erstelle einen neuen Unterordner: munich/<slug>/
         → <slug> = URL-sicherer Name, z.B. "bevoelkerungswachstum"

      2. Baue die Viz dort als eigenständige App
         (Vite + React + TS oder vanilla — beides OK)

      3. Füge eine Karte in .card-grid ein:

         <article class="card">
           <a href="./<slug>/index.html" class="card-link">
             <img class="card-preview"
                  src="./shared/<slug>-preview.png"
                  alt="Vorschau <Titel>" />
             <div class="card-body">
               <span class="card-tag">KATEGORIE</span>
               <h2 class="card-title">Titel der Visualisierung</h2>
               <p class="card-desc">Ein Satz Beschreibung.</p>
               <div class="card-footer">
                 <span class="card-year">JJJJ</span>
                 <span class="card-arrow">→</span>
               </div>
             </div>
           </a>
         </article>

         Preview-Screenshot: pnpm dev starten, Screenshot als
         ./shared/<slug>-preview.png speichern (1400×900 empfohlen).

      4. Sicherstellen: Die Viz verlinkt zurück mit
         <a href="../index.html">← München</a>

      Kategorien bisher: BEVÖLKERUNG, INFRASTRUKTUR, WIRTSCHAFT
      ════════════════════════════════════════════════════════════════
    */

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
      transition:
        border-color var(--transition-base),
        box-shadow var(--transition-base),
        transform var(--transition-base);
    }

    .card:hover {
      border-color: var(--accent-green);
      box-shadow:
        0 0 0 1px rgba(74, 222, 128, 0.08),
        0 8px 32px rgba(74, 222, 128, 0.06);
      transform: translateY(-2px);
    }

    .card-link {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card-preview {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      object-position: center;
      display: block;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      opacity: 0.85;
      transition: opacity var(--transition-base);
    }

    .card:hover .card-preview {
      opacity: 1;
    }

    .card-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px 24px 22px;
      flex: 1;
    }

    .card-tag {
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--accent-green);
      opacity: 0.7;
    }

    .card-title {
      font-size: 19px;
      font-weight: normal;
      color: var(--text-primary);
      letter-spacing: 0.5px;
      line-height: 1.3;
      flex: 1;
    }

    .card-desc {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.7;
      letter-spacing: 0.2px;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--border-muted);
    }

    .card-year {
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--text-muted);
    }

    .card-arrow {
      font-size: 14px;
      color: var(--accent-green);
      opacity: 0;
      transition: opacity var(--transition-base), transform var(--transition-base);
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    /* ── Footer ─────────────────────────────────────────────────── */
    footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid var(--border-muted);
      text-align: center;
    }

    .footer-text {
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--text-muted);
    }

    /* ── Responsiv ──────────────────────────────────────────────── */
    @media (max-width: 600px) {
      body { padding: 0 16px 48px; }
      header { padding: 40px 0 32px; margin-bottom: 40px; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <p class="header-eyebrow">STADT MÜNCHEN · OPEN DATA</p>
    <h1 class="header-title">
      Datenvisualisierungen
      <span class="header-subtitle">STADTBEZIRKE · BEVÖLKERUNG · MOBILITÄT</span>
    </h1>
  </header>

  <main>
    <p class="section-label">ALLE VISUALISIERUNGEN</p>

    <div class="card-grid">

      <!-- ─────────────────────────────────────────────────────────
           Binnenwanderungsziffer
           Datenquelle: Statistisches Amt München
           Stand: 2023 · Kategorie: BEVÖLKERUNG
           ───────────────────────────────────────────────────────── -->
      <article class="card">
        <a href="./binnenwanderungsziffer/dist/index.html" class="card-link">
          <img
            class="card-preview"
            src="./shared/binnenwanderungsziffer-preview.png"
            alt="Vorschau Binnenwanderungsziffer"
          />
          <div class="card-body">
            <span class="card-tag">BEVÖLKERUNG</span>
            <h2 class="card-title">Binnenwanderungsziffer</h2>
            <p class="card-desc">
              Netto-Wanderungssaldo pro 1.000 Einwohner zwischen
              den 25 Münchner Stadtbezirken — nach Nationalität.
            </p>
            <div class="card-footer">
              <span class="card-year">2023</span>
              <span class="card-arrow">→</span>
            </div>
          </div>
        </a>
      </article>

      <!-- NEUE KARTE HIER EINFÜGEN (Konvention siehe Kommentar oben) -->

    </div>
  </main>

  <footer>
    <p class="footer-text">MÜNCHEN · DATEN &amp; STATISTIK</p>
  </footer>

</body>
</html>
